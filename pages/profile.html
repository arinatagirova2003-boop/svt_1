<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редагування профілю — Інститут комп'ютерного моделювання</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card auth-card--wide">
      <h2>Редагування профілю</h2>
      <form action="#" method="POST">
        <div class="auth-field">
          <label for="firstname">Ім'я</label>
          <input type="text" id="firstname" name="firstname" value="Орина">
        </div>
        <div class="auth-field">
          <label for="lastname">Прізвище</label>
          <input type="text" id="lastname" name="lastname" value="Тагірова">
        </div>
        <div class="auth-field">
          <label for="login">Логін</label>
          <input type="text" id="login" name="login" value="oryna_t">
        </div>
        <div class="auth-field">
          <label for="email">Електронна пошта</label>
          <input type="email" id="email" name="email" value="oryna@example.com">
        </div>
        <div class="auth-field">
          <label for="pwd">Пароль</label>
          <input type="password" id="pwd" name="password" value="password">
        </div>
        <div class="auth-field">
          <label for="faculty">Факультет</label>
          <input type="text" id="faculty" name="faculty" value="Комп'ютерні науки">
        </div>
        <div class="auth-field">
          <label for="group">Група</label>
          <input type="text" id="group" name="group" value="ІКМ-224а">
        </div>
        <div class="auth-field">
          <label for="city">Місто</label>
          <input type="text" id="city" name="city" value="Харків">
        </div>
        <div class="auth-field">
          <label for="bio">Про себе</label>
          <textarea id="bio" name="bio" rows="3">Студентка НТУ «ХПІ»</textarea>
        </div>
        <button type="submit" id="saveBtn" class="auth-btn">Зберегти зміни</button>
      </form>
    </div>
  </div>
</body>
</html>
