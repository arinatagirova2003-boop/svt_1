<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація — Інститут комп'ютерного моделювання</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h2>Реєстрація</h2>
      <form action="#" method="POST">
        <div class="auth-field">
          <label for="username">Ім'я користувача</label>
          <input type="text" id="username" name="username" placeholder="Введіть ім'я" required>
        </div>
        <div class="auth-field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="name@example.com" required>
        </div>
        <div class="auth-field">
          <label for="pwd">Пароль</label>
          <input type="password" id="pwd" name="password" placeholder="Не менше 8 символів" minlength="8" required>
        </div>
        <button type="submit" class="auth-btn">Зареєструватися</button>
      </form>
      <p class="auth-footer">Вже є акаунт? <a href="login.html">Увійти</a></p>
    </div>
  </div>
</body>
</html>
